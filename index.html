<!-- GitHub Pages SPA redirect decoder (pairs with public/404.html).
     Restores the clean URL that 404.html encoded into ?/… before the app boots. -->
<script type="text/javascript">
  (function (l) {
    if (l.search[1] === '/') {
      var decoded = l.search.slice(1).split('&').map(function (s) {
        return s.replace(/~and~/g, '&');
      }).join('?');
      window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
    }
  })(window.location);
</script>
